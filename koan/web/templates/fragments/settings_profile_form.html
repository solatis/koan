<div class="profile-form">
  {% if not is_edit %}
  <div class="tier-form-row">
    <span class="tier-form-label">Name</span>
    <input type="text" class="model-tier-input profile-name-input" placeholder="profile name" value="{{ name }}">
  </div>
  {% else %}
  <div class="tier-form-row">
    <span class="tier-form-label">Name</span>
    <input type="text" class="model-tier-input" value="{{ name }}" disabled>
  </div>
  {% endif %}
  {% for tier in ["strong", "standard", "cheap"] %}
  {% set t = tiers.get(tier, {}) %}
  <div class="tier-form-row">
    <span class="tier-form-label">{{ tier }}</span>
    <select class="model-tier-select tier-runner-select" data-tier="{{ tier }}">
      <option value="">-- runner --</option>
      {% for r in available_runners %}
      <option value="{{ r.runner_type }}"{% if t.get("runner_type") == r.runner_type %} selected{% endif %}>{{ r.runner_type }}</option>
      {% endfor %}
    </select>
    <select class="model-tier-select tier-model-select" data-tier="{{ tier }}" data-initial="{{ t.get('model', '') }}">
      <option value="">-- model --</option>
    </select>
    <select class="model-tier-select tier-thinking-select" data-tier="{{ tier }}" data-initial="{{ t.get('thinking', '') }}">
      <option value="">-- thinking --</option>
    </select>
  </div>
  {% endfor %}
  <div class="tier-form-row" style="margin-top:8px">
    <button class="btn btn-primary btn-save-profile" data-name="{{ name }}" data-edit="{{ '1' if is_edit else '0' }}" style="padding:6px 16px">Save</button>
    <button class="btn btn-secondary btn-cancel-profile" style="padding:6px 16px">Cancel</button>
  </div>
</div>
