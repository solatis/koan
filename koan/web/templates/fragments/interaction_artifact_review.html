<div class="phase-content">
  <div class="phase-inner">
    <h2 class="phase-heading">Artifact Review</h2>
    {% if description %}
    <p class="phase-status">{{ description }}</p>
    {% endif %}
    <div id="artifact-review-form" data-token="{{ token }}">
      <div class="artifact-review-content">{{ content }}</div>
      <textarea id="artifact-review-textarea" class="artifact-review-feedback"
                placeholder="Optional feedback..."></textarea>
      <div class="form-actions">
        <button id="btn-send-feedback" class="btn btn-secondary">Send Feedback</button>
        <button id="btn-accept-artifact" class="btn btn-primary">Accept</button>
      </div>
    </div>
  </div>
</div>
