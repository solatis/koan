<div class="sidebar-heading">Artifacts</div>
{% if not artifacts %}
<div class="artifacts-empty">No artifacts yet</div>
{% else %}
{% for folder_name, files in artifact_tree.items() %}
<div class="tree-folder">
  <div class="tree-folder-label">{{ folder_name }}/</div>
  <div class="tree-children">
    {% for f in files %}
    <div class="tree-file" data-path="{{ f.path }}">
      <span class="tree-file-name">{{ f.name }}</span>
      <span class="tree-file-meta">{{ f.formatted_size }} -- {{ f.modified_display }}</span>
    </div>
    {% endfor %}
  </div>
</div>
{% endfor %}
{% endif %}
