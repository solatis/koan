<div class="profile-form">
  <div class="tier-form-row">
    <span class="tier-form-label">Alias</span>
    <input type="text" class="model-tier-input inst-alias-input" placeholder="alias" value="{{ alias }}"{{ " disabled" if is_edit else "" }}>
  </div>
  <div class="tier-form-row">
    <span class="tier-form-label">Runner</span>
    <select class="model-tier-select inst-runner-select">
      <option value="">-- runner type --</option>
      {% for r in all_runners %}
      <option value="{{ r.runner_type }}"{% if runner_type == r.runner_type %} selected{% endif %}>{{ r.runner_type }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="tier-form-row">
    <span class="tier-form-label">Binary</span>
    <input type="text" class="model-tier-input inst-binary-input" placeholder="/usr/bin/..." value="{{ binary }}">
    <button class="btn btn-secondary btn-detect-binary" style="padding:4px 10px;font-size:13px">Detect</button>
  </div>
  <div class="tier-form-row">
    <span class="tier-form-label">Extra args</span>
    <input type="text" class="model-tier-input inst-extra-args-input" placeholder="--flag1 --flag2" value="{{ extra_args }}">
  </div>
  <div class="tier-form-row" style="margin-top:8px">
    <button class="btn btn-primary btn-save-inst" data-alias="{{ alias }}" data-edit="{{ '1' if is_edit else '0' }}" style="padding:6px 16px">Save</button>
    <button class="btn btn-secondary btn-cancel-inst" style="padding:6px 16px">Cancel</button>
  </div>
</div>
