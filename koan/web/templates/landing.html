{% extends "base.html" %}
{% block content %}
<header class="header">
  <div class="header-left">
    <span class="logo">koan</span>
  </div>
  <div class="header-right">
    <button class="settings-btn" aria-label="Settings">&#9881;</button>
  </div>
</header>
<div class="main-panel">
  <div class="phase-content">
    <div class="phase-inner">
      <h2 class="phase-heading">New Run</h2>

      <div class="question-card">
        <div class="question-header">Task</div>
        <textarea id="task-input" class="workflow-feedback"
          placeholder="Describe what you want to build..."
          rows="4">{{ task or "" }}</textarea>
      </div>

      <div class="model-config-section">
        <h3 class="model-config-section-heading">Profile</h3>
        <select id="profile-select" class="model-tier-select">
          {% for p in profiles %}
          <option value="{{ p.name }}"{% if p.name == active_profile %} selected{% endif %}>
            {{ p.name }}{% if p.read_only %} (built-in){% endif %}
          </option>
          {% endfor %}
        </select>
      </div>

      <div class="model-config-section">
        <h3 class="model-config-section-heading">Scout Concurrency</h3>
        <input id="scout-concurrency" class="scout-concurrency-input" type="number"
          min="1" max="32" value="{{ scout_concurrency }}">
      </div>

      <div class="form-actions">
        {% if has_runners %}
        <button id="btn-start-run" class="btn btn-primary">Start Run</button>
        {% else %}
        <button id="btn-start-run" class="btn btn-primary" disabled
          title="No available runners. Install and authenticate at least one runner in Settings.">Start Run</button>
        {% endif %}
      </div>
      {% if not has_runners %}
      <span class="no-runners-msg">No available runners. Open Settings to install and authenticate a runner.</span>
      {% endif %}
    </div>
  </div>
</div>

<div id="settings-overlay" class="settings-overlay" hidden>
  <div class="settings-overlay-backdrop">
    <div class="settings-overlay-panel">
      <div class="settings-overlay-header">
        <span class="settings-overlay-title">Settings</span>
        <button class="settings-btn" id="btn-close-settings" aria-label="Close">&#10005;</button>
      </div>
      <div class="settings-overlay-body" id="settings-overlay-body">
        <p class="settings-section-heading">Loading...</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
